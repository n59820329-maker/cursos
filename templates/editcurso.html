<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
    <title>Editar curso</title>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-4">
                <div class="card shadow rounded-4 border-0">
                    <div class="bg-primary rounded-top-4" style="height: 10px;"></div>
                    <div class="card-body p-4">
                        <form method="POST">
                            <h2 class="text-center text-primary mb-4">
                                Editar curso
                            </h2>
                            <label>Título</label>
                            <input type="text" name="titulo"
                                value="{{ curso[1] }}"
                                class="form-control rounded-3 mb-3">

                            <label>Descripción</label>
                            <textarea name="descripcion"
                                class="form-control rounded-3 mb-3"
                                rows="3">{{ curso[2] }}</textarea>

                            <label>Categoría</label>
                            <select name="categoria" class="form-control rounded-3 mb-3">
                                <option value="Programación" {% if curso[3] == 'Programación' %}selected{% endif %}>Programación</option>
                                <option value="Diseño" {% if curso[3] == 'Diseño' %}selected{% endif %}>Diseño</option>
                                <option value="Marketing" {% if curso[3] == 'Marketing' %}selected{% endif %}>Marketing</option>
                                <option value="Negocios" {% if curso[3] == 'Negocios' %}selected{% endif %}>Negocios</option>
                            </select>

                            <label>Nivel</label>
                            <select name="nivel" class="form-control rounded-3 mb-3">
                                <option value="Básico" {% if curso[4] == 'Básico' %}selected{% endif %}>Básico</option>
                                <option value="Intermedio" {% if curso[4] == 'Intermedio' %}selected{% endif %}>Intermedio</option>
                                <option value="Avanzado" {% if curso[4] == 'Avanzado' %}selected{% endif %}>Avanzado</option>
                            </select>

                            <label>Imagen</label>
                            <img src="{{ url_for('static', filename='img/' + curso[5]) }}"
                                class="img-fluid rounded-3 mb-2"
                                style="height: 100px; object-fit: contain;">
                            <input type="text" name="imagen"
                                value="{{ curso[5] }}"
                                class="form-control rounded-3 mb-4">

                            <button type="submit" class="btn btn-primary w-100 rounded-3">
                                Guardar cambios
                            </button>
                            <a href="/admin" class="btn btn-outline-secondary w-100 rounded-3 mt-2">
                                Cancelar
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>
</html>
