<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
    <title>Agregar curso</title>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-4">
                <div class="card shadow rounded-4 border-0">
                    <div class="bg-primary rounded-top-4" style="height: 10px;"></div>
                    <div class="card-body p-4">
                        <form action="/addcurso" method="POST">
                            <h2 class="text-center text-primary mb-4">
                                Agregar curso
                            </h2>
                            <label>Título</label>
                            <input type="text" name="titulo"
                                class="form-control rounded-3 mb-3"
                                placeholder="Título del curso">
                            <label>Descripción</label>
                            <textarea name="descripcion"
                                class="form-control rounded-3 mb-3"
                                placeholder="Descripción del curso"
                                rows="3"></textarea>
                            <label>Categoría</label>
                            <select name="categoria" class="form-control rounded-3 mb-3">
                                <option value="Programación">Programación</option>
                                <option value="Diseño">Diseño</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Negocios">Negocios</option>
                                <option value="Fotografía">Fotografía</option>
                                <option value="Música">Música</option>
                                <option value="Idiomas">Idiomas</option>
                                <option value="IA">IA</option>
                            </select>
                            <label>Nivel</label>
                            <select name="nivel" class="form-control rounded-3 mb-3">
                                <option value="Básico">Básico</option>
                                <option value="Intermedio">Intermedio</option>
                                <option value="Avanzado">Avanzado</option>
                            </select>
                            <label>Imagen</label>
                            <input type="text" name="imagen"
                                class="form-control rounded-3 mb-4"
                                placeholder="ejemplo.jpg">
                            <button type="submit" class="btn btn-primary w-100 rounded-3">
                                Agregar curso
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>
</html>
