<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Agregar material</title>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-4">
                <div class="card shadow rounded-4 border-0">
                    <div class="bg-success rounded-top-4" style="height: 10px;"></div>
                    <div class="card-body p-4">
                        <form action="/addmaterial/{{ idCurso }}" method="POST" enctype="multipart/form-data">
                            <h2 class="text-center text-success mb-4">
                                Agregar material
                            </h2>
                            <label>Título del material</label>
                            <input type="text" name="titulo" class="form-control rounded-3 mb-3"
                                placeholder="Ej: Introducción a Python">
                            <label>Tipo</label>
                            <select name="tipo" class="form-control rounded-3 mb-3" onchange="toggleInput(this.value)">
                                <option value="video">Video</option>
                                <option value="pdf">PDF</option>
                                <option value="link">Link</option>
                            </select>
                            <div id="campoLink">
                                <label>Link</label>
                                <input type="text" name="link" class="form-control rounded-3 mb-4"
                                    placeholder="https://...">
                            </div>
                            <div id="campoPDF" style="display:none;">
                                <label>Archivo PDF</label>
                                <input type="file" name="archivo" class="form-control rounded-3 mb-4" accept=".pdf">
                            </div>
                            <button type="submit" class="btn btn-success w-100 rounded-3">
                                Agregar material
                            </button>
                            <a href="/admin" class="btn btn-outline-secondary w-100 rounded-3 mt-2">
                                Cancelar
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script>
        function toggleInput(tipo) {
            if (tipo === 'pdf') {
                document.getElementById('campoLink').style.display = 'none';
                document.getElementById('campoPDF').style.display = 'block';
            } else {
                document.getElementById('campoLink').style.display = 'block';
                document.getElementById('campoPDF').style.display = 'none';
            }
        }
    </script>
</body>

</html>
