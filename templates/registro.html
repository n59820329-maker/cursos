<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

    <link rel="stylesheet" href="./static/style.css">

    <title>Usuarios</title>

</head>

<body>

    <div class="container">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-4">
                <div class="card shadow rounded-4 border-0">
                    <div class="bg-primary rounded-top-4"
                        style="height: 10px;"></div>
                    <div class="card-body p-4">
                        <form action="/add" method="POST">
                            <h1 class="text-center mb-4">
                                Registrarse
                            </h1>
                            <label for="idUsuario">Identificación</label>
                            <input type="text"
                                name="idUsuario"
                                placeholder="Ingresar identificación"
                                class="form-control rounded-3 mb-3">
                            <label for="nombre">Nombre</label>
                            <input type="text"
                                name="nombre"
                                placeholder="Ingresar nombre"
                                class="form-control rounded-3 mb-3">
                            <label for="correo">Correo</label>
                            <input type="email"
                                name="correo"
                                placeholder="Ingresar correo"
                                class="form-control rounded-3 mb-3">
                            <label for="password">Contraseña</label>
                            <input type="password"
                                name="password"
                                placeholder="Ingresar contraseña"
                                class="form-control rounded-3 mb-4">
                            <div class="d-flex gap-3">
                                <button type="submit"
                                    class="btn btn-primary w-50 rounded-3">
                                    Registrar
                                </button>
                                <a href="/"
                                    class="btn btn-outline-primary w-50 rounded-3">
                                    Volver
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>

</body>

</html>
