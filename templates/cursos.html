<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Mis cursos</title>
</head>
<body class="bg-light">
    <button onclick="toggleSidebar()" class="btn btn-primary position-fixed"
        style="top: 15px; left: 15px; z-index: 999;">
        <i class="bi bi-list"></i>
    </button>
    <div class="d-flex" style="min-height: 100vh;">
        <div id="sidebar" class="bg-primary text-white d-flex flex-column p-3"
            style="width: 220px; min-height: 100vh;">
            <h4 class="mb-4 mt-2 ms-5">
                <i class="bi bi-mortarboard-fill me-2"></i> Cursos Online
            </h4>
            <hr class="border-light">
            <a href="/cursos" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                <i class="bi bi-house-fill me-2"></i> Inicio
            </a>
            <a href="/mis_cursos" class="text-white text-decoration-none py-2 px-2 rounded mb-1">
                <i class="bi bi-book-fill me-2"></i> Mis cursos
            </a>
            <a href="/" class="text-white text-decoration-none py-2 px-2 rounded mt-auto">
                <i class="bi bi-box-arrow-left me-2"></i> Cerrar sesión
            </a>
        </div>
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="ms-5">Todos los cursos</h3>
                <input type="text" class="form-control w-25" placeholder="Buscar cursos... 🔎">
            </div>
            <div class="row">
                {% for curso in cursos %}
                <div class="col-md-4 mb-4">
                    <div class="card shadow rounded-4 border-0 h-100">
                        <img src="{{ url_for('static', filename='img/' + curso[5]) }}"
                            class="card-img-top rounded-top-4">
                        <div class="card-body d-flex flex-column">
                            <span class="badge bg-primary mb-2">{{ curso[3] }}</span>
                            <span class="badge bg-secondary mb-2 w-25">{{ curso[4] }}</span>
                            <h5>{{ curso[1] }}</h5>
                            <p class="text-muted small">{{ curso[2] }}</p>
                            <form action="/inscribirse" method="POST" class="mt-auto">
                                <input type="hidden" name="idUsuario" value="{{ idUsuario }}">
                                <input type="hidden" name="idCurso" value="{{ curso[0] }}">
                                <button class="btn btn-primary w-100" type="submit">
                                    Inscribirse
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
